<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CineVerse</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#000;
overflow:hidden;
font-family:Inter;
}

#canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}

#loading{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:10;
}

.bar{
width:200px;
height:3px;
background:#222;
overflow:hidden;
}

.fill{
height:100%;
width:0%;
background:linear-gradient(90deg,#7c5cff,#5ec8ff);
}

#brand{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:70px;
color:white;
font-family:Cinzel;
opacity:0;
transition:2s;
}

#skip{
position:fixed;
bottom:40px;
right:40px;
padding:10px 20px;
background:rgba(0,0,0,0.6);
border:1px solid #444;
color:white;
cursor:pointer;
z-index:20;
}

</style>
</head>

<body>

<div id="loading">

<h2 style="color:white;letter-spacing:5px;">CINEVERSE</h2>

<div class="bar">
<div class="fill" id="fill"></div>
</div>

</div>

<div id="brand">CineVerse</div>

<button id="skip">Skip Intro</button>

<canvas id="canvas"></canvas>

<script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>

<script>

const canvas=document.getElementById("canvas")

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.z=40

const renderer=new THREE.WebGLRenderer({
canvas,
antialias:true
})

renderer.setSize(window.innerWidth,window.innerHeight)
renderer.setPixelRatio(window.devicePixelRatio)

window.addEventListener("resize",()=>{

camera.aspect=window.innerWidth/window.innerHeight
camera.updateProjectionMatrix()
renderer.setSize(window.innerWidth,window.innerHeight)

})

/* STAR FIELD */

const starCount=3000
const geo=new THREE.BufferGeometry()

const pos=new Float32Array(starCount*3)

for(let i=0;i<starCount;i++){

pos[i*3]=(Math.random()-0.5)*400
pos[i*3+1]=(Math.random()-0.5)*400
pos[i*3+2]=(Math.random()-0.5)*400

}

geo.setAttribute(
"position",
new THREE.BufferAttribute(pos,3)
)

const mat=new THREE.PointsMaterial({
color:0xffffff,
size:1
})

const stars=new THREE.Points(geo,mat)

scene.add(stars)

/* POSTERS */

const loader=new THREE.TextureLoader()

const posters=[]

const files=[
"poster1.jpg",
"poster2.jpg",
"poster3.jpg",
"poster4.jpg"
]

files.forEach((file,i)=>{

const tex=loader.load(file)

const g=new THREE.PlaneGeometry(6,9)

const m=new THREE.MeshBasicMaterial({
map:tex
})

const mesh=new THREE.Mesh(g,m)

mesh.position.x=Math.cos(i*1.5)*20
mesh.position.y=(Math.random()-0.5)*10
mesh.position.z=Math.sin(i*1.5)*20

scene.add(mesh)

posters.push(mesh)

})

/* ANIMATION */

let time=0
let running=false

function animate(){

requestAnimationFrame(animate)

if(!running)return

time+=0.01

stars.rotation.y+=0.0004

posters.forEach((p,i)=>{

p.rotation.y+=0.01

p.position.x=Math.cos(time+i)*20
p.position.z=Math.sin(time+i)*20

})

renderer.render(scene,camera)

}

animate()

/* LOADING BAR */

let progress=0
const fill=document.getElementById("fill")

const loading=setInterval(()=>{

progress+=2

fill.style.width=progress+"%"

if(progress>=100){

clearInterval(loading)

document.getElementById("loading").style.display="none"

running=true

setTimeout(()=>{

document.getElementById("brand").style.opacity=1

},1000)

}

},40)

/* SKIP INTRO */

document.getElementById("skip").onclick=()=>{

document.getElementById("loading").style.display="none"

running=true

document.getElementById("brand").style.opacity=1

}

</script>

</body>
</html>
